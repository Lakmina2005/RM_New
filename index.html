<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HUB 2026</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
        }

        body {
            background-color: var(--dark-bg);
            color: #e6edf3;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .date-container { margin-bottom: 30px; text-align: center; }

        .update-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* පාවෙන Animations */
        @keyframes floatLeft {
            0%, 100% { transform: translate(0px, 0px); }
            50% { transform: translate(-8px, -12px); }
        }

        @keyframes floatRight {
            0%, 100% { transform: translate(8px, -12px); }
            50% { transform: translate(0px, 0px); }
        }

        .content-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            font-size: 1.1em;
            text-transform: uppercase;
            margin: 20px 0 15px 0;
            animation: floatLeft 4s ease-in-out infinite;
        }

        .neon-card {
            position: relative;
            background: var(--card-bg);
            padding: 4px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            width: 100%;
            animation: floatRight 5s ease-in-out infinite;
        }

        .neon-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(var(--neon-blue), #0044ff, transparent, var(--neon-blue));
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .card-content {
            position: relative;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            z-index: 1;
        }

        /* Progress Bar Styles */
        .progress-container {
            background: #21262d;
            height: 25px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            align-items: center;
        }

        .progress-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #001f5b 0%, #0044ff 50%, var(--neon-blue) 100%);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 0 15px var(--neon-blue);
            transition: width 1s ease-in-out;
        }

        #percentText {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.75em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #000;
            z-index: 2;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: lightMove 2.5s infinite linear;
        }

        @keyframes lightMove { 100% { left: 100%; } }

        table { width: 100%; border-collapse: collapse; }
        th { color: var(--neon-blue); border-bottom: 1px solid rgba(0,242,255,0.3); padding: 10px; }
        td { padding: 10px; text-align: center; font-size: 1.1em; }

        /* Quick Contacts Styling */
        .contact-item {
            background: rgba(255,255,255,0.05);
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--neon-blue);
        }

        .item-left { animation: floatLeft 4s ease-in-out infinite; }
        .item-right { animation: floatRight 4.5s ease-in-out infinite; }

        .btn-msg {
            background: var(--neon-blue);
            color: #000;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.75em;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: 0.3s;
        }

        .btn-msg:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-blue); }
    </style>
</head>
<body>

    <div class="date-container">
        <div class="update-badge">
            LAST UPDATED: <span id="fullUpdate">...</span>
        </div>
    </div>

    <div class="content-wrapper">
        
        <h2>Quantity of pieces</h2>
        <div class="neon-card">
            <div class="card-content">
                <table>
                    <thead>
                        <tr><th>SIZE</th><th>PIECES</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>XXS</td><td>___</td></tr>
                        <tr><td>XS</td><td>212</td></tr>
                        <tr><td>S</td><td>212</td></tr>
                        <tr><td>M</td><td>212</td></tr>
                        <tr><td>L</td><td>212</td></tr>
                        <tr><td>XL</td><td>212</td></tr>
                        <tr><td>XXL</td><td>___</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <h2>Production Status</h2>
        <div class="neon-card" style="animation-delay: 0.5s;">
            <div class="card-content">
                <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 10px; font-weight: bold;">
                    <span>Target</span>
                    <span style="color: var(--neon-blue);">1060 Pcs</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" id="progressBar"></div>
                    <div id="percentText">0% Completed</div>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 0.85em; color: #8b949e;">
                    සම්පූර්ණ වීමට තව <span id="pcsLeft" style="color: var(--neon-blue); font-weight: bold;">...</span> පීස් අවශ්‍යයි
                </div>
            </div>
        </div>

        <h2>Quick Contacts</h2>
        <div class="neon-card">
            <div class="card-content">
                <div class="contact-item item-left">
                    <div style="text-align: left;">
                        <strong>නදීරා👤</strong><br>
                        <small style="color: var(--neon-blue);">Supervisor</small>
                    </div>
                    <a href="https://wa.me/94712186599?text=*👤Helo_Rm*%0A*🔎EPF* _%0A*🔖Neme* _" class="btn-msg">MESSAGE</a>
                </div>

                <div class="contact-item item-right">
                    <div style="text-align: left;">
                        <strong>තනූජා👤</strong><br>
                        <small style="color: #8b949e;">Mo</small>
                    </div>
                    <a href="https://wa.me/94775974277?text=*👤Helo_Rm*%0A*🔎EPF* _%0A*🔖Neme* _" class="btn-msg">MESSAGE</a>
                </div>

                <div class="contact-item item-left">
                    <div style="text-align: left;">
                        <strong>𝐑𝐌 𝐓𝐞𝐚𝐦 ②</strong><br>
                        <small style="color: #8b949e;">🤟</small>
                    </div>
                    <a href="https://chat.whatsapp.com/Dmh1QSRBlA9GxZuxqj9du0" class="btn-msg">GROUP</a>
                </div>
            </div>
        </div>

    </div>

<script>
    function updateData() {
        // --- අගය මෙතන වෙනස් කරන්න ---
        const target = 1060;
        const currentDone = 523; 
        // -------------------------

        const percentage = Math.round((currentDone / target) * 100);
        document.getElementById("progressBar").style.width = percentage + "%";
        document.getElementById("percentText").innerText = percentage + "% Completed";
        document.getElementById("pcsLeft").innerText = (target - currentDone);

        let modDate = new Date(document.lastModified);
        const lankaTimeOptions = { timeZone: 'Asia/Colombo' };
        const year = modDate.toLocaleString('en-US', { ...lankaTimeOptions, year: 'numeric' });
        const month = modDate.toLocaleString('en-US', { ...lankaTimeOptions, month: 'short' });
        const day = modDate.toLocaleString('en-US', { ...lankaTimeOptions, day: 'numeric' });
        const time = modDate.toLocaleString('en-US', { ...lankaTimeOptions, hour: 'numeric', minute: 'numeric', hour12: true });
        document.getElementById("fullUpdate").innerHTML = `${year} ${month} ${day}, ${time}`;
    }
    updateData();
</script>

</body>
</html>
