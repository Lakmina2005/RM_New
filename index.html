<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPF Verification</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,255,0.2); width: 350px; text-align: center; border: 1px solid #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; box-shadow: 0 0 15px #38bdf8; }
        
        /* Signup කොටස මුලින්ම සඟවා තැබීම */
        #signupSection { display: none; }
        .error { color: #f87171; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h2 style="color: #38bdf8;">ඇතුල් වන්න</h2>
        <p style="font-size: 14px; opacity: 0.8;">ඔබේ EPF අංකය ඇතුළත් කරන්න</p>
        <input type="text" id="epfInput" placeholder="EPF අංකය">
        <button onclick="checkEPF()">ඉදිරියට</button>
        <p id="msg" class="error"></p>
    </div>

    <div id="signupSection">
        <h3 style="color: #fbbf24;">ලියාපදිංචි වන්න</h3>
        <p style="font-size: 13px;">සමාවන්න ඔබ අපහා ලියාපදිංචි වී නොමැත. කරුණාකර ඔබගේ නම ඇතුළත් කරන්න… ( පැය 24ක් ඇතුලත ඔබට පනිවිඩයක් එයි)</p>
        <input type="text" id="newName" placeholder="ඔබේ නම">
        <input type="text" id="newEpf" placeholder="EPF අංකය">
        <button onclick="sendToWhatsApp()" style="background: #fbbf24;">විස්තර යවන්න</button>
        <br><br>
        <a href="#" onclick="location.reload()" style="color: #38bdf8; font-size: 12px; text-decoration: none;">නැවත උත්සාහ කරන්න</a>
    </div>
</div>

<script>
    const validEPF = ["4627", "4273", "4888", "2976", "4599", "0593", "2645", "2745", "2586", "4828", "4669", "3395", "4586", "4608", "4762", "4836", "3321", "2599", "3319", "4746", "4741", "2562"];

    function checkEPF() {
        let input = document.getElementById("epfInput").value.trim();
        let loginSection = document.getElementById("loginSection");
        let signupSection = document.getElementById("signupSection");

        if (validEPF.includes(input)) {
            // හරි නම් 1.html වෙත යයි
            window.location.href = "1.html";
        } else {
            // වැරදි නම් ලොගින් කොටස සඟවා සයිනප් කොටස පෙන්වයි
            loginSection.style.display = "none";
            signupSection.style.display = "block";
            document.getElementById("newEpf").value = input; // වැරදි අංකය auto-fill වෙයි
        }
    }

    function sendToWhatsApp() {
        let name = document.getElementById("newName").value;
        let epf = document.getElementById("newEpf").value;
        let phone = "94788637885";

        if (name === "" || epf === "") {
            alert("කරුණාකර සියලු විස්තර පුරවන්න.");
            return;
        }

        let message = `*_~RM Team 2~_ නව ලියාපදිංචියක්*:%0A*නම:* ${name}%0A*EPF අංකය:* ${epf}`;
        let whatsappURL = `https://wa.me/${phone}?text=${message}`;

        window.open(whatsappURL, '_blank');
    }
</script>

</body>
</html>
